# Render Blueprint for the Backend subdirectory

services:
  - type: web
    name: fish-id-backend
    env: node
    # Root directory for the backend service
    rootDir: Backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # Set this in the Render dashboard
      - key: JWT_SECRET
        generateValue: true # Generates a random string if not provided
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
